basePath: /
definitions:
  models.Transaction:
    properties:
      amount:
        type: number
      id:
        type: string
      type:
        type: string
    type: object
  models.Wallet:
    properties:
      balance:
        type: number
      id:
        type: string
      name:
        type: string
      transactions:
        items:
          $ref: '#/definitions/models.Transaction'
        type: array
    type: object
host: localhost:9000
info:
  contact: {}
  description: A simple wallet API
  title: Wallet API
  version: "1.0"
paths:
  /wallets:
    post:
      consumes:
      - application/json
      parameters:
      - description: Wallet name
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Wallet'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new wallet
      tags:
      - wallets
  /wallets/{id}:
    get:
      parameters:
      - description: Wallet ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Wallet'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a wallet by ID
      tags:
      - wallets
  /wallets/{id}/transactions:
    get:
      parameters:
      - description: Wallet ID
        in: path
        name: id
        required: true
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Transaction'
            type: array
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get transactions for a wallet
      tags:
      - transactions
    post:
      consumes:
      - application/json
      parameters:
      - description: Wallet ID
        in: path
        name: id
        required: true
        type: string
      - description: Transaction input
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Wallet'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Add a transaction to a wallet
      tags:
      - transactions
swagger: "2.0"
